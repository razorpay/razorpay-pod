name: Prepare Release

# Triggers on every PR push from a release/* branch to master (or the
# test base branch chore/spm-optimisation).
# Idempotent: skips all processing if xcframeworks are already gone
# (i.e. a previous run already handled them).
on:
  pull_request:
    branches: [master, chore/spm-optimisation]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: prepare-release-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  prepare:
    if: startsWith(github.head_ref, 'release/')
    runs-on: macos-latest
    outputs:
      version:              ${{ steps.version.outputs.value }}
      xcframeworks_present: ${{ steps.check.outputs.xcframeworks_present }}
      sha:                  ${{ steps.commit.outputs.sha }}

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.CI_BOT_TOKEN }}
          fetch-depth: 0

      - name: Extract version from branch name
        id: version
        run: |
          BRANCH="${{ github.head_ref }}"
          VERSION="${BRANCH#release/}"
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      # All subsequent steps are gated on xcframeworks being present.
      # Once this job has run and deleted them, the next synchronize
      # event re-runs this workflow but exits here — no double processing.
      - name: Check xcframeworks present
        id: check
        run: |
          MISSING=()
          for FW in \
            "Pod/core/Razorpay.xcframework" \
            "Pod/core/RazorpayCore.xcframework" \
            "Pod/RazorpayStandard.xcframework" \
            "Pod/RazorpayCustom.xcframework"; do
            [ -d "$FW" ] || MISSING+=("$FW")
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "xcframeworks_present=false" >> $GITHUB_OUTPUT
            echo "Already processed (or not yet committed): ${MISSING[*]}"
          else
            echo "xcframeworks_present=true" >> $GITHUB_OUTPUT
            echo "All four xcframeworks found — proceeding."
          fi

      # ── Step 1: Zip ───────────────────────────────────────────────────────
      - name: Create xcframework zips
        if: steps.check.outputs.xcframeworks_present == 'true'
        run: |
          (cd Pod/core  && zip -rX "$OLDPWD/Razorpay.xcframework.zip"         Razorpay.xcframework)
          (cd Pod/core  && zip -rX "$OLDPWD/RazorpayCore.xcframework.zip"     RazorpayCore.xcframework)
          (cd Pod       && zip -rX "$OLDPWD/RazorpayStandard.xcframework.zip" RazorpayStandard.xcframework)
          (cd Pod       && zip -rX "$OLDPWD/RazorpayCustom.xcframework.zip"   RazorpayCustom.xcframework)
          echo "Zips created:"
          ls -lh *.xcframework.zip

      # ── Step 2: Checksums ─────────────────────────────────────────────────
      - name: Compute checksums
        if: steps.check.outputs.xcframeworks_present == 'true'
        id: checksums
        run: |
          CS_RAZORPAY=$(swift package compute-checksum Razorpay.xcframework.zip)
          CS_CORE=$(swift package compute-checksum RazorpayCore.xcframework.zip)
          CS_STANDARD=$(swift package compute-checksum RazorpayStandard.xcframework.zip)
          CS_CUSTOM=$(swift package compute-checksum RazorpayCustom.xcframework.zip)

          echo "razorpay=$CS_RAZORPAY"   >> $GITHUB_OUTPUT
          echo "core=$CS_CORE"           >> $GITHUB_OUTPUT
          echo "standard=$CS_STANDARD"   >> $GITHUB_OUTPUT
          echo "custom=$CS_CUSTOM"       >> $GITHUB_OUTPUT

          echo "Checksums:"
          echo "  Razorpay:         $CS_RAZORPAY"
          echo "  RazorpayCore:     $CS_CORE"
          echo "  RazorpayStandard: $CS_STANDARD"
          echo "  RazorpayCustom:   $CS_CUSTOM"

      # ── Step 3: Package.swift ─────────────────────────────────────────────
      - name: Update Package.swift
        if: steps.check.outputs.xcframeworks_present == 'true'
        run: |
          python3 .github/scripts/update_package_swift.py \
            "${{ steps.version.outputs.value }}" \
            "${{ steps.checksums.outputs.razorpay }}" \
            "${{ steps.checksums.outputs.core }}" \
            "${{ steps.checksums.outputs.standard }}" \
            "${{ steps.checksums.outputs.custom }}"
          grep -E 'binaryVersion|packageVersion|checksum' Package.swift

      # ── Step 4: collection.json ───────────────────────────────────────────
      - name: Update collection.json
        if: steps.check.outputs.xcframeworks_present == 'true'
        run: |
          python3 .github/scripts/update_collection.py "${{ steps.version.outputs.value }}"
          echo "collection.json updated."

      # ── Step 5: Delete xcframeworks ───────────────────────────────────────
      - name: Delete xcframework directories
        if: steps.check.outputs.xcframeworks_present == 'true'
        run: |
          rm -rf Pod/core/Razorpay.xcframework
          rm -rf Pod/core/RazorpayCore.xcframework
          rm -rf Pod/RazorpayStandard.xcframework
          rm -rf Pod/RazorpayCustom.xcframework
          echo "xcframeworks deleted."

      # ── Step 6: Upload zips as artifacts ─────────────────────────────────
      - name: Upload xcframework zips
        if: steps.check.outputs.xcframeworks_present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: xcframework-zips-${{ steps.version.outputs.value }}
          path: "*.xcframework.zip"
          retention-days: 7

      # ── Step 7: Commit ────────────────────────────────────────────────────
      - name: Commit release preparation
        if: steps.check.outputs.xcframeworks_present == 'true'
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Package.swift collection.json

          git rm -rf --cached \
            Pod/core/Razorpay.xcframework \
            Pod/core/RazorpayCore.xcframework \
            Pod/RazorpayStandard.xcframework \
            Pod/RazorpayCustom.xcframework 2>/dev/null || true

          git commit -m "chore: prepare release ${{ steps.version.outputs.value }}"
          git push origin "${{ github.head_ref }}"

          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  # ── Job 2: Create pre-release ────────────────────────────────────────────
  # Runs only when the prepare job actually processed xcframeworks.
  # Downloads the zips from the same workflow run and attaches them to the release.
  publish:
    needs: prepare
    if: needs.prepare.outputs.xcframeworks_present == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download xcframework zips
        uses: actions/download-artifact@v4
        with:
          name: xcframework-zips-${{ needs.prepare.outputs.version }}

      - name: Verify all four zips present
        run: |
          MISSING=()
          for ZIP in \
            Razorpay.xcframework.zip \
            RazorpayCore.xcframework.zip \
            RazorpayStandard.xcframework.zip \
            RazorpayCustom.xcframework.zip; do
            [ -f "$ZIP" ] || MISSING+=("$ZIP")
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "❌ Missing zips: ${MISSING[*]}"
            exit 1
          fi
          echo "✅ All four zips present:"
          ls -lh *.xcframework.zip

      - name: Create GitHub pre-release and upload assets
        env:
          GH_TOKEN: ${{ secrets.CI_BOT_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
          SHA: ${{ needs.prepare.outputs.sha }}
        run: |
          gh release create "$VERSION" \
            --repo "${{ github.repository }}" \
            --title "v${VERSION}" \
            --target "$SHA" \
            --prerelease \
            --generate-notes \
            Razorpay.xcframework.zip \
            RazorpayCore.xcframework.zip \
            RazorpayStandard.xcframework.zip \
            RazorpayCustom.xcframework.zip

          echo "✅ Pre-release v${VERSION} created."

      - name: Print release URL
        env:
          GH_TOKEN: ${{ secrets.CI_BOT_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          URL=$(gh release view "$VERSION" \
            --repo "${{ github.repository }}" \
            --json url --jq '.url')
          echo "Release URL: $URL"

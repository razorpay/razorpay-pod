name: Deploy Standard Checkout

on:
  repository_dispatch:
    types:
      - deploy_standard_xcframework
  pull_request:
    types:
      - closed
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: deploy-standard-checkout-${{ github.event.pull_request.number || github.event.client_payload.version || github.run_id }}
  cancel-in-progress: false


jobs:
  deploy-standard:
    name: Deploy standard checkout
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DEPLOYMENT_VERSION: ${{ github.event.client_payload.version }}
      IS_RC: ${{ github.event.client_payload.is_rc }}
      CORE_CHANGED: ${{ github.event.client_payload.core_changed }}
      CORE_VERSION: ${{ github.event.client_payload.core_version || '' }}
      SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
      SOURCE_RUN_ID: ${{ github.event.client_payload.run_id }}
      SDK_ARTIFACT: ${{ github.event.client_payload.artifacts.sdk }}
      WRAPPER_ARTIFACT: ${{ github.event.client_payload.artifacts.wrapper }}
      CORE_ARTIFACT: ${{ github.event.client_payload.artifacts.core || '' }}
      CHECKSUM_SDK: ${{ github.event.client_payload.checksums.sdk }}
      CHECKSUM_WRAPPER: ${{ github.event.client_payload.checksums.wrapper }}
      CHECKSUM_CORE: ${{ github.event.client_payload.checksums.core || '' }}

    steps:
      - name: Checkout master
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: master
          token: ${{ secrets.CI_BOT_TOKEN }}
          fetch-depth: 0

      - name: Validate dispatch payload
        run: |
          set -eo pipefail

          REQUIRED_VARS=(
            DEPLOYMENT_VERSION
            SOURCE_REPO
            SOURCE_RUN_ID
            SDK_ARTIFACT
            WRAPPER_ARTIFACT
            CHECKSUM_SDK
            CHECKSUM_WRAPPER
          )

          for var_name in "${REQUIRED_VARS[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "❌ Missing required payload field: ${var_name}"
              exit 1
            fi
          done

          if [ "${CORE_CHANGED}" = "true" ]; then
            for var_name in CORE_ARTIFACT CHECKSUM_CORE CORE_VERSION; do
              if [ -z "${!var_name}" ]; then
                echo "❌ Missing required core payload field: ${var_name}"
                exit 1
              fi
            done
          fi

      - name: Create or reuse release branch
        run: |
          set -eo pipefail

          RELEASE_BRANCH="release/v${DEPLOYMENT_VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin "${RELEASE_BRANCH}:${RELEASE_BRANCH}" 2>/dev/null || true

          if git show-ref --verify --quiet "refs/heads/${RELEASE_BRANCH}"; then
            git checkout "${RELEASE_BRANCH}"
          else
            git checkout -b "${RELEASE_BRANCH}"
          fi

      - name: Download SDK XCFramework zip artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          github-token: ${{ secrets.CI_BOT_TOKEN }}
          repository: ${{ env.SOURCE_REPO }}
          run-id: ${{ env.SOURCE_RUN_ID }}
          name: ${{ env.SDK_ARTIFACT }}
          path: /tmp/artifacts/sdk

      - name: Download Wrapper XCFramework zip artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          github-token: ${{ secrets.CI_BOT_TOKEN }}
          repository: ${{ env.SOURCE_REPO }}
          run-id: ${{ env.SOURCE_RUN_ID }}
          name: ${{ env.WRAPPER_ARTIFACT }}
          path: /tmp/artifacts/wrapper

      - name: Download Core XCFramework zip artifact
        if: env.CORE_CHANGED == 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          github-token: ${{ secrets.CI_BOT_TOKEN }}
          repository: ${{ env.SOURCE_REPO }}
          run-id: ${{ env.SOURCE_RUN_ID }}
          name: ${{ env.CORE_ARTIFACT }}
          path: /tmp/artifacts/core

      - name: Verify artifacts and replace vendored XCFrameworks
        run: |
          set -eo pipefail

          find_archive() {
            local input_dir="$1"
            local archive_name="$2"
            local discovered

            discovered=$(find "$input_dir" -name "$archive_name" -type f | head -1)
            if [ -z "$discovered" ]; then
              echo "❌ ${archive_name} not found in ${input_dir}"
              find "$input_dir" -maxdepth 3 -type f
              exit 1
            fi
            printf '%s\n' "$discovered"
          }

          verify_archive_sha() {
            local archive_path="$1"
            local expected_sha="$3"
            local label="$2"
            local actual_sha

            actual_sha=$(sha256sum "$archive_path" | awk '{print $1}')

            if [ "$actual_sha" != "$expected_sha" ]; then
              echo "❌ Checksum mismatch for ${label}"
              echo "   Expected: ${expected_sha}"
              echo "   Actual:   ${actual_sha}"
              exit 1
            fi
          }

          require_xcframework() {
            local input_dir="$1"
            local expected_name="$2"
            local discovered

            discovered=$(find "$input_dir" -name "$expected_name" -type d | head -1)
            if [ -z "$discovered" ]; then
              echo "❌ ${expected_name} not found after unzip"
              find "$input_dir" -maxdepth 4 \( -type d -o -type f \)
              exit 1
            fi
            printf '%s\n' "$discovered"
          }

          SDK_ARCHIVE=$(find_archive /tmp/artifacts/sdk sdk-xcframework.zip)
          WRAPPER_ARCHIVE=$(find_archive /tmp/artifacts/wrapper wrapper-xcframework.zip)

          verify_archive_sha "$SDK_ARCHIVE" "RazorpayStandard.xcframework" "$CHECKSUM_SDK"
          verify_archive_sha "$WRAPPER_ARCHIVE" "Razorpay.xcframework" "$CHECKSUM_WRAPPER"

          rm -rf /tmp/sdk-artifact /tmp/wrapper-artifact /tmp/core-artifact
          mkdir -p /tmp/sdk-artifact /tmp/wrapper-artifact
          unzip -q "$SDK_ARCHIVE" -d /tmp/sdk-artifact
          unzip -q "$WRAPPER_ARCHIVE" -d /tmp/wrapper-artifact

          SDK_XCFW=$(require_xcframework /tmp/sdk-artifact RazorpayStandard.xcframework)
          WRAPPER_XCFW=$(require_xcframework /tmp/wrapper-artifact Razorpay.xcframework)

          rm -rf Pod/RazorpayStandard.xcframework
          mkdir -p Pod/core
          rm -rf Pod/core/Razorpay.xcframework

          cp -R "$SDK_XCFW" Pod/RazorpayStandard.xcframework
          cp -R "$WRAPPER_XCFW" Pod/core/Razorpay.xcframework

          if [ "${CORE_CHANGED}" = "true" ]; then
            CORE_ARCHIVE=$(find_archive /tmp/artifacts/core core-xcframework.zip)
            verify_archive_sha "$CORE_ARCHIVE" "RazorpayCore.xcframework" "$CHECKSUM_CORE"
            mkdir -p /tmp/core-artifact
            unzip -q "$CORE_ARCHIVE" -d /tmp/core-artifact
            CORE_XCFW=$(require_xcframework /tmp/core-artifact RazorpayCore.xcframework)
            rm -rf Pod/core/RazorpayCore.xcframework
            cp -R "$CORE_XCFW" Pod/core/RazorpayCore.xcframework
          fi

      - name: Update podspec versions
        run: |
          set -eo pipefail

          chmod +x .github/scripts/update_podspec_version.sh
          ./.github/scripts/update_podspec_version.sh "${DEPLOYMENT_VERSION}"
          echo "✅ razorpay-pod.podspec → v${DEPLOYMENT_VERSION}"

          if [ "${CORE_CHANGED}" = "true" ]; then
            sed -Ei "s/(s\\.dependency 'razorpay-core-pod'[[:space:]]*,[[:space:]]*')[^']*'/\\1${CORE_VERSION}'/" razorpay-pod.podspec
            echo "✅ razorpay-core-pod dependency → ${CORE_VERSION}"
          fi

      - name: Commit and push release branch
        run: |
          set -eo pipefail

          RELEASE_BRANCH="release/v${DEPLOYMENT_VERSION}"

          git add Pod/RazorpayStandard.xcframework Pod/core/Razorpay.xcframework razorpay-pod.podspec
          if [ "${CORE_CHANGED}" = "true" ]; then
            git add Pod/core/RazorpayCore.xcframework
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update standard checkout to v${DEPLOYMENT_VERSION}"
          git push origin "${RELEASE_BRANCH}"

      - name: Create pull request
        env:
          CI_BOT_TOKEN: ${{ secrets.CI_BOT_TOKEN }}
        run: |
          set -eo pipefail

          RELEASE_BRANCH="release/v${DEPLOYMENT_VERSION}"
          CORE_LINES=""
          if [ "${CORE_CHANGED}" = "true" ]; then
            CORE_LINES=$(cat <<EOF
          - Updated \`Pod/core/RazorpayCore.xcframework\`
          - Updated \`razorpay-core-pod\` dependency to \`${CORE_VERSION}\`
          EOF
          )
          fi

          PR_BODY=$(cat <<EOF
          ## Standard Checkout v${DEPLOYMENT_VERSION}

          ### Updated frameworks
          - Updated \`Pod/RazorpayStandard.xcframework\`
          - Updated \`Pod/core/Razorpay.xcframework\` (Wrapper)
          ${CORE_LINES}
          - Bumped \`razorpay-pod.podspec\` to v${DEPLOYMENT_VERSION}

          ---
          Opened automatically by CI.
          EOF
          )

          HTTP_STATUS=$(curl --silent --output /tmp/pr_response.json --write-out "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CI_BOT_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/razorpay/razorpay-pod/pulls" \
            -d "$(jq -n \
              --arg title "release: v${DEPLOYMENT_VERSION}" \
              --arg body "$PR_BODY" \
              --arg head "$RELEASE_BRANCH" \
              --arg base "master" \
              '{title: $title, body: $body, head: $head, base: $base}')")

          if [ "$HTTP_STATUS" -eq 201 ]; then
            PR_URL=$(jq -r '.html_url' /tmp/pr_response.json)
            echo "✅ PR created: ${PR_URL}"
          elif [ "$HTTP_STATUS" -eq 422 ]; then
            echo "⚠️ PR already exists"
            jq -r '.errors[0].message // .message' /tmp/pr_response.json
          else
            echo "❌ Failed to create PR (HTTP ${HTTP_STATUS})"
            cat /tmp/pr_response.json
            exit 1
          fi

      - name: Job summary
        if: always()
        run: |
          echo "## Deploy Standard Checkout v${DEPLOYMENT_VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${DEPLOYMENT_VERSION}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| RC | ${IS_RC} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| RazorpayStandard.xcframework | ✅ replaced |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Razorpay.xcframework (Wrapper) | ✅ replaced |" >> "$GITHUB_STEP_SUMMARY"
          if [ "${CORE_CHANGED}" = "true" ]; then
            echo "| RazorpayCore.xcframework | ✅ replaced |" >> "$GITHUB_STEP_SUMMARY"
            echo "| razorpay-core-pod dependency | \`${CORE_VERSION}\` |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| RazorpayCore.xcframework | — unchanged |" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "| PR | opened to master |" >> "$GITHUB_STEP_SUMMARY"

  release:
    name: Tag, release, and publish
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'master' &&
      startsWith(github.event.pull_request.head.ref, 'release/') &&
      startsWith(github.event.pull_request.title, 'release: v') &&
      contains(github.event.pull_request.body || '', 'Opened automatically by CI.')
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout merged release commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          token: ${{ secrets.CI_BOT_TOKEN }}
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Read version from podspec
        id: version
        run: |
          chmod +x .github/scripts/read-podspec-version.sh
          VERSION=$(./.github/scripts/read-podspec-version.sh)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION}"

      - name: Detect release state
        id: state
        env:
          CI_BOT_TOKEN: ${{ secrets.CI_BOT_TOKEN }}
        run: |
          set -eo pipefail

          VERSION="${{ steps.version.outputs.version }}"
          TAG_NAME="v${VERSION}"
          RELEASE_URL=""

          git fetch --force --tags origin

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG_NAME}" >/dev/null; then
            TAG_EXISTS="true"
          else
            TAG_EXISTS="false"
          fi

          HTTP_STATUS=$(curl --silent --output /tmp/release_response.json --write-out "%{http_code}" \
            -H "Authorization: Bearer ${CI_BOT_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/razorpay/razorpay-pod/releases/tags/${TAG_NAME}")

          if [ "$HTTP_STATUS" -eq 200 ]; then
            RELEASE_EXISTS="true"
            RELEASE_URL=$(jq -r '.html_url' /tmp/release_response.json)
          elif [ "$HTTP_STATUS" -eq 404 ]; then
            RELEASE_EXISTS="false"
          else
            echo "❌ Failed to read GitHub release state (HTTP ${HTTP_STATUS})"
            cat /tmp/release_response.json
            exit 1
          fi

          POD_INFO=$(pod trunk info razorpay-pod 2>/dev/null || true)
          if printf '%s\n' "$POD_INFO" | grep -Eq "(^|[[:space:]])${VERSION}([[:space:]]|$)"; then
            POD_PUBLISHED="true"
          else
            POD_PUBLISHED="false"
          fi

          if [ "$RELEASE_EXISTS" = "true" ] && [ "$TAG_EXISTS" != "true" ]; then
            echo "❌ GitHub release exists for ${TAG_NAME}, but the tag is missing remotely."
            exit 1
          fi

          if [ "$POD_PUBLISHED" = "true" ] && { [ "$TAG_EXISTS" != "true" ] || [ "$RELEASE_EXISTS" != "true" ]; }; then
            echo "❌ CocoaPods already has ${VERSION}, but tag/release state is inconsistent."
            exit 1
          fi

          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag_exists=${TAG_EXISTS}" >> "$GITHUB_OUTPUT"
          echo "release_exists=${RELEASE_EXISTS}" >> "$GITHUB_OUTPUT"
          echo "release_url=${RELEASE_URL}" >> "$GITHUB_OUTPUT"
          echo "pod_published=${POD_PUBLISHED}" >> "$GITHUB_OUTPUT"

          echo "── Release state ──"
          echo "  Tag          : ${TAG_EXISTS}"
          echo "  GitHub Release: ${RELEASE_EXISTS}"
          echo "  CocoaPods    : ${POD_PUBLISHED}"

      - name: Create and push tag
        if: steps.state.outputs.tag_exists != 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG_NAME="${{ steps.state.outputs.tag_name }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG_NAME}" -m "Release Standard Checkout ${VERSION}"
          git push origin "${TAG_NAME}"
          echo "✅ Tagged ${TAG_NAME}"

      - name: Create GitHub Release
        if: steps.state.outputs.release_exists != 'true'
        env:
          CI_BOT_TOKEN: ${{ secrets.CI_BOT_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG_NAME="${{ steps.state.outputs.tag_name }}"

          IS_PRERELEASE="false"
          if [[ "$VERSION" == *"-rc"* ]]; then
            IS_PRERELEASE="true"
          fi

          HTTP_STATUS=$(curl --silent --output /tmp/release_response.json --write-out "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CI_BOT_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/razorpay/razorpay-pod/releases" \
            -d "$(jq -n \
              --arg tag_name "${TAG_NAME}" \
              --arg name "Standard Checkout ${VERSION}" \
              --arg target "${{ github.event.pull_request.merge_commit_sha }}" \
              --argjson prerelease ${IS_PRERELEASE} \
              --argjson generate_release_notes true \
              '{tag_name: $tag_name, name: $name, target_commitish: $target, prerelease: $prerelease, generate_release_notes: $generate_release_notes}')")

          if [ "$HTTP_STATUS" -eq 201 ]; then
            RELEASE_URL=$(jq -r '.html_url' /tmp/release_response.json)
            echo "✅ GitHub Release created: ${RELEASE_URL}"
          elif [ "$HTTP_STATUS" -eq 422 ]; then
            echo "⚠️  Release for ${TAG_NAME} already exists"
          else
            echo "❌ Failed to create release (HTTP ${HTTP_STATUS})"
            cat /tmp/release_response.json
            exit 1
          fi

      - name: Validate CocoaPods token
        if: steps.state.outputs.pod_published != 'true'
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}
        run: |
          if [ -z "${COCOAPODS_TRUNK_TOKEN}" ]; then
            echo "❌ COCOAPODS_TRUNK_TOKEN is not configured."
            exit 1
          fi
      - name: Publish to CocoaPods
        if: steps.state.outputs.pod_published != 'true'
        run: |
          set -eo pipefail
          pod lib lint razorpay-pod.podspec --allow-warnings
          pod trunk push razorpay-pod.podspec --allow-warnings
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}

      - name: Job summary
        if: always()
        run: |
          echo "## Released Standard Checkout v${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Pull Request | #${{ github.event.pull_request.number }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Merge Commit | \`${{ github.event.pull_request.merge_commit_sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | \`${{ steps.state.outputs.tag_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.state.outputs.tag_exists }}" = "true" ]; then
            echo "| Tag action | skipped (already exists) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Tag action | created |" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ steps.state.outputs.release_exists }}" = "true" ]; then
            echo "| GitHub Release | skipped (already exists) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| GitHub Release | created |" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ steps.state.outputs.pod_published }}" = "true" ]; then
            echo "| CocoaPods | skipped (already published) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| CocoaPods | published |" >> "$GITHUB_STEP_SUMMARY"
          fi

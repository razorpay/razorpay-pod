name: Deploy Standard Checkout

on:
  repository_dispatch:
    types: [deploy_standard_xcframework]
  push:
    branches:
      - master

env:
  DEPLOYMENT_VERSION: ${{ github.event.client_payload.version || '' }}
  IS_RC: ${{ github.event.client_payload.is_rc || '' }}
  CORE_CHANGED: ${{ github.event.client_payload.core_changed || 'false' }}
  WRAPPER_CHANGED: ${{ github.event.client_payload.wrapper_changed || 'false' }}
  RUN_ID: ${{ github.event.client_payload.run_id || '' }}

jobs:
# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Download artifacts, update podspec, open PR to master
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy and open PR
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.CI_BOT_TOKEN }}
          fetch-depth: 1

      - name: Create release branch
        run: |
          git checkout -b "release/${{ env.DEPLOYMENT_VERSION }}"

      - name: Download XCFramework artifacts
        env:
          CI_BOT_TOKEN: ${{ secrets.CI_BOT_TOKEN }}
        run: |
          echo "── Downloading xcframework artifacts from run #${RUN_ID} ──"

          ARTIFACTS_JSON=$(curl --silent \
            -H "Authorization: Bearer ${CI_BOT_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/razorpay/razorpay-ios/actions/runs/${RUN_ID}/artifacts")

          # Download SDK xcframework artifact (always available)
          SDK_ARTIFACT_URL=$(echo "$ARTIFACTS_JSON" | jq -r '.artifacts[] | select(.name | startswith("xcframework-standard-")) | .archive_download_url' | head -1)
          if [ -z "$SDK_ARTIFACT_URL" ] || [ "$SDK_ARTIFACT_URL" = "null" ]; then
            echo "❌ SDK xcframework artifact not found in run #${RUN_ID}"
            echo "Available artifacts:"
            echo "$ARTIFACTS_JSON" | jq '.artifacts[].name'
            exit 1
          fi

          curl -L --silent \
            -H "Authorization: Bearer ${CI_BOT_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -o /tmp/sdk-xcframework.zip "$SDK_ARTIFACT_URL"
          mkdir -p /tmp/sdk-artifact
          unzip -q /tmp/sdk-xcframework.zip -d /tmp/sdk-artifact
          echo "✅ SDK xcframework artifact downloaded"

          # Download RazorpayWrapper artifact (when wrapper or core changed)
          if [ "${WRAPPER_CHANGED}" = "true" ] || [ "${CORE_CHANGED}" = "true" ]; then
            WRAPPER_ARTIFACT_URL=$(echo "$ARTIFACTS_JSON" | jq -r '.artifacts[] | select(.name | startswith("xcframework-razorpaywrapper-")) | .archive_download_url' | head -1)
            if [ -z "$WRAPPER_ARTIFACT_URL" ] || [ "$WRAPPER_ARTIFACT_URL" = "null" ]; then
              echo "❌ RazorpayWrapper xcframework artifact not found"
              exit 1
            fi

            curl -L --silent \
              -H "Authorization: Bearer ${CI_BOT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -o /tmp/wrapper-xcframework.zip "$WRAPPER_ARTIFACT_URL"
            mkdir -p /tmp/wrapper-artifact
            unzip -q /tmp/wrapper-xcframework.zip -d /tmp/wrapper-artifact
            echo "✅ RazorpayWrapper xcframework artifact downloaded"
          fi

          # Download RazorpayCore artifact (only when core changed)
          if [ "${CORE_CHANGED}" = "true" ]; then
            CORE_ARTIFACT_URL=$(echo "$ARTIFACTS_JSON" | jq -r '.artifacts[] | select(.name | startswith("xcframework-razorpaycore-")) | .archive_download_url' | head -1)
            if [ -z "$CORE_ARTIFACT_URL" ] || [ "$CORE_ARTIFACT_URL" = "null" ]; then
              echo "❌ RazorpayCore xcframework artifact not found"
              exit 1
            fi

            curl -L --silent \
              -H "Authorization: Bearer ${CI_BOT_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -o /tmp/core-xcframework.zip "$CORE_ARTIFACT_URL"
            mkdir -p /tmp/core-artifact
            unzip -q /tmp/core-xcframework.zip -d /tmp/core-artifact
            echo "✅ RazorpayCore xcframework artifact downloaded"
          fi

      - name: Replace xcframeworks
        run: |
          echo "── Replacing xcframeworks ──"

          # ── 1. RazorpayStandard.xcframework (always replaced) ──
          rm -rf Pod/RazorpayStandard.xcframework
          rm -rf Pod/RazorpayStandard.framework.dSYM
          rm -rf Pod/Razorpay.framework

          SDK_XCFW=$(find /tmp/sdk-artifact -name "*.xcframework" -type d | head -1)
          if [ -z "$SDK_XCFW" ]; then
            echo "❌ No .xcframework found in downloaded SDK artifact"
            ls -R /tmp/sdk-artifact
            exit 1
          fi
          cp -R "$SDK_XCFW" Pod/RazorpayStandard.xcframework
          echo "✅ Pod/RazorpayStandard.xcframework → replaced"

          # ── 2. Razorpay.xcframework (RazorpayWrapper) ──
          if [ "${WRAPPER_CHANGED}" = "true" ] || [ "${CORE_CHANGED}" = "true" ]; then
            mkdir -p Pod/core
            rm -rf Pod/core/Razorpay.xcframework

            WRAPPER_XCFW=$(find /tmp/wrapper-artifact -name "Razorpay.xcframework" -type d | head -1)
            if [ -z "$WRAPPER_XCFW" ]; then
              echo "❌ Razorpay.xcframework not found in wrapper artifact"
              exit 1
            fi
            cp -R "$WRAPPER_XCFW" Pod/core/Razorpay.xcframework
            echo "✅ Pod/core/Razorpay.xcframework → replaced"
          else
            echo "ℹ️  Pod/core/Razorpay.xcframework → unchanged"
          fi

          # ── 3. RazorpayCore.xcframework ──
          if [ "${CORE_CHANGED}" = "true" ]; then
            mkdir -p Pod/core
            rm -rf Pod/core/RazorpayCore.xcframework

            CORE_XCFW=$(find /tmp/core-artifact -name "RazorpayCore.xcframework" -type d | head -1)
            if [ -z "$CORE_XCFW" ]; then
              echo "❌ RazorpayCore.xcframework not found in core artifact"
              exit 1
            fi
            cp -R "$CORE_XCFW" Pod/core/RazorpayCore.xcframework
            echo "✅ Pod/core/RazorpayCore.xcframework → replaced"
          else
            echo "ℹ️  Pod/core/RazorpayCore.xcframework → unchanged"
          fi

          echo ""
          echo "── Final Pod/ contents ──"
          find Pod/ -maxdepth 2 -type d

      - name: Update podspec version
        run: |
          chmod +x .github/scripts/update_podspec_version.sh
          ./.github/scripts/update_podspec_version.sh "${{ env.DEPLOYMENT_VERSION }}"
          echo "✅ Podspec updated to v${{ env.DEPLOYMENT_VERSION }}"
          grep "s.version" razorpay-pod.podspec

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit (repo already clean)"
          else
            git commit -m "chore: update podspec to v${{ env.DEPLOYMENT_VERSION }}"
            git push origin "release/${{ env.DEPLOYMENT_VERSION }}"
          fi

      - name: Create pull request
        env:
          CI_BOT_TOKEN: ${{ secrets.CI_BOT_TOKEN }}
        run: |
          RELEASE_BRANCH="release/${{ env.DEPLOYMENT_VERSION }}"

          PR_BODY=$(cat <<'PREOF'
          ## Standard Checkout v${{ env.DEPLOYMENT_VERSION }}

          ### What's in this PR
          - Updated `Pod/RazorpayStandard.xcframework`
          - Podspec version bumped to `${{ env.DEPLOYMENT_VERSION }}`

          ---
          Opened automatically by CI.
          PREOF
          )

          HTTP_STATUS=$(curl --silent --output /tmp/pr_response.json --write-out "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CI_BOT_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/razorpay/razorpay-pod/pulls" \
            -d "$(jq -n \
              --arg title "release: standard checkout v${{ env.DEPLOYMENT_VERSION }}" \
              --arg body "$PR_BODY" \
              --arg head "$RELEASE_BRANCH" \
              --arg base "master" \
              '{title: $title, body: $body, head: $head, base: $base}')")

          if [ "$HTTP_STATUS" -eq 201 ]; then
            PR_URL=$(jq -r '.html_url' /tmp/pr_response.json)
            echo "✅ PR created: ${PR_URL}"
          elif [ "$HTTP_STATUS" -eq 422 ]; then
            echo "⚠️  PR already exists (HTTP 422)"
            jq -r '.errors[0].message // .message' /tmp/pr_response.json
          else
            echo "❌ Failed to create PR (HTTP ${HTTP_STATUS})"
            cat /tmp/pr_response.json
            exit 1
          fi

      - name: Job summary
        if: always()
        run: |
          echo "## Deploy Standard Checkout v${{ env.DEPLOYMENT_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ env.DEPLOYMENT_VERSION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| RC | ${{ env.IS_RC }} |" >> $GITHUB_STEP_SUMMARY
          echo "| RazorpayStandard.xcframework | ✅ replaced |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ env.CORE_CHANGED }}" = "true" ]; then
            echo "| RazorpayCore.xcframework | ✅ replaced |" >> $GITHUB_STEP_SUMMARY
            echo "| Razorpay.xcframework (Wrapper) | ✅ replaced |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ env.WRAPPER_CHANGED }}" = "true" ]; then
            echo "| RazorpayCore.xcframework | previous version |" >> $GITHUB_STEP_SUMMARY
            echo "| Razorpay.xcframework (Wrapper) | ✅ replaced |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| RazorpayCore.xcframework | previous version |" >> $GITHUB_STEP_SUMMARY
            echo "| Razorpay.xcframework (Wrapper) | previous version |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| PR | opened to master |" >> $GITHUB_STEP_SUMMARY

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — After PR merge to master: tag, release, publish to CocoaPods
# ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Tag, release, and publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CI_BOT_TOKEN }}
          fetch-depth: 1

      - name: Read version from podspec
        id: version
        run: |
          chmod +x .github/scripts/read-podspec-version.sh
          VERSION=$(./.github/scripts/read-podspec-version.sh)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Detected version: ${VERSION}"

      - name: Create and push tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG_NAME="v${VERSION}"

          if git rev-parse "${TAG_NAME}" >/dev/null 2>&1; then
            echo "⚠️  Tag ${TAG_NAME} already exists, skipping"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG_NAME}" -m "Release Standard Checkout ${VERSION}"
          git push origin "${TAG_NAME}"
          echo "✅ Tagged ${TAG_NAME}"

      - name: Create GitHub Release
        env:
          CI_BOT_TOKEN: ${{ secrets.CI_BOT_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG_NAME="v${VERSION}"

          IS_PRERELEASE="false"
          if [[ "$VERSION" == *"-rc"* ]]; then
            IS_PRERELEASE="true"
          fi

          HTTP_STATUS=$(curl --silent --output /tmp/release_response.json --write-out "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CI_BOT_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/razorpay/razorpay-pod/releases" \
            -d "$(jq -n \
              --arg tag_name "${TAG_NAME}" \
              --arg name "Standard Checkout ${VERSION}" \
              --arg target "master" \
              --argjson prerelease ${IS_PRERELEASE} \
              --argjson generate_release_notes true \
              '{tag_name: $tag_name, name: $name, target_commitish: $target, prerelease: $prerelease, generate_release_notes: $generate_release_notes}')")

          if [ "$HTTP_STATUS" -eq 201 ]; then
            RELEASE_URL=$(jq -r '.html_url' /tmp/release_response.json)
            echo "✅ GitHub Release created: ${RELEASE_URL}"
          elif [ "$HTTP_STATUS" -eq 422 ]; then
            echo "⚠️  Release for ${TAG_NAME} already exists"
          else
            echo "❌ Failed to create release (HTTP ${HTTP_STATUS})"
            cat /tmp/release_response.json
            exit 1
          fi

      - name: Publish to CocoaPods
        run: |
          set -eo pipefail
          pod lib lint razorpay-pod.podspec --allow-warnings
          pod trunk push razorpay-pod.podspec --allow-warnings
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}

      - name: Job summary
        if: always()
        run: |
          echo "## Released Standard Checkout v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`v${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Release | ✅ created |" >> $GITHUB_STEP_SUMMARY
          echo "| CocoaPods | ✅ published |" >> $GITHUB_STEP_SUMMARY
